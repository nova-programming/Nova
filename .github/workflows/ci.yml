name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Galaxy tests
        run: python -m unittest tests.test_galaxy -v

      - name: Run Installer tests
        run: python -m unittest tests.test_installers -v

      - name: Nova smoke test — version
        run: python main.py --version

      - name: Nova smoke test — VM execution
        run: printf 'print("Hello from Nova CI")\n' > /tmp/hello.nv && python main.py dev /tmp/hello.nv

      - name: Verify install.py imports cleanly
        run: python -c "import install; print('install.py OK')"
