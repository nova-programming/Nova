name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Galaxy tests
        run: python -m unittest tests.test_galaxy -v

      - name: Run Installer tests
        run: python -m unittest tests.test_installers -v

      - name: Run x86_64 codegen tests
        run: python -m unittest tests.test_codegen_x86_64 -v
        if: matrix.os != 'macos-latest'

      - name: Run ARM64 codegen tests
        run: python -m unittest tests.test_codegen_arm64 -v
        if: matrix.os == 'macos-latest'

      - name: Nova smoke test — version
        run: python main.py --version

      - name: Nova smoke test — VM execution
        run: |
          mkdir -p /tmp/nova-ci
          printf 'print("Hello from Nova CI")\n' > /tmp/nova-ci/hello.nv
          python main.py dev /tmp/nova-ci/hello.nv

      - name: Native compilation — generate assembly, compile runtime, assemble + link
        run: |
          mkdir -p /tmp/nova-ci
          printf 'print(42)\n' > /tmp/nova-ci/test.nv
          arch_flag=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            arch_flag="-arch arm64"
          fi
          python main.py build $arch_flag /tmp/nova-ci/test.nv
          ls -la /tmp/nova-ci/test.exe /tmp/nova-ci/test.s

      - name: Execute native binary
        run: |
          chmod +x /tmp/nova-ci/test.exe
          output=$(/tmp/nova-ci/test.exe 2>&1)
          echo "$output"
          echo "$output" | grep -q "42"

      - name: Verify install.py imports cleanly
        run: python -c "import install; print('install.py OK')"
