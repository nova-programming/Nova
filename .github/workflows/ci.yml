name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Galaxy tests
        run: python -m unittest tests.test_galaxy -v

      - name: Run Installer tests
        run: python -m unittest tests.test_installers -v

      - name: Run x86_64 codegen tests
        run: python -m unittest tests.test_codegen_x86_64 -v
        if: runner.os != 'macOS'

      - name: Run ARM64 codegen tests
        run: python -m unittest tests.test_codegen_arm64 -v
        if: runner.os == 'macOS'

      - name: Nova smoke test — version
        run: python bootstrap/main.py --version

      - name: Nova smoke test — VM execution
        run: |
          mkdir -p ./ci-tmp
          printf 'print("Hello from Nova CI")\n' > ./ci-tmp/hello.nv
          python bootstrap/main.py dev ./ci-tmp/hello.nv

      - name: Native compilation — generate assembly, compile runtime, assemble + link
        if: runner.os != 'Windows'
        run: |
          set +e
          mkdir -p ./ci-tmp
          printf 'print("Hello from Nova CI")\n' > ./ci-tmp/test_cc.nv
          python bootstrap/main.py build ./ci-tmp/test_cc.nv; rc=$?
          echo "=== build exit code: $rc ==="
          echo "=== Generated assembly ==="
          cat ./ci-tmp/test_cc.s 2>&1 || echo "(no assembly)"
          if [ -f ./ci-tmp/test_cc ]; then
            echo "=== nm linked binary ==="
            nm ./ci-tmp/test_cc 2>&1 || true
            echo "=== otool -tv _main ==="
            otool -tV ./ci-tmp/test_cc 2>&1 | head -40 || true
            echo "=== DATA section hex dump ==="
            otool -s __DATA __data ./ci-tmp/test_cc 2>&1 | head -60 || true
            echo "=== run ==="
            ./ci-tmp/test_cc
          fi
          exit $rc

      - name: Self-hosted bootstrap — Build stage1 compiler
        if: runner.os != 'Windows'
        run: |
          set +e
          python bootstrap/main.py build nova.nv; rc=$?
          echo "=== stage1 build exit code: $rc ==="
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "=== nova.s (first 100 lines) ==="
            head -100 ./nova.s 2>&1 || echo "(no nova.s)"
          fi
          exit $rc

      - name: Self-hosted bootstrap — Setup
        if: runner.os != 'Windows'
        run: |
          mv ./nova ./nova-stage1
          mkdir -p ./ci-tmp
          printf 'print("Self-hosted Nova OK")\n' > ./ci-tmp/selfhost.nv

      - name: "Self-hosted bootstrap — Debug: Does stage1 even start?"
        if: runner.os != 'Windows'
        run: |
          set +e
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "=== nm stage1 (first 30 lines) ==="
            nm ./nova-stage1 2>&1 | head -30
            echo "=== otool -tv _main (first 30 lines) ==="
            otool -tV ./nova-stage1 2>&1 | head -30
            echo "=== otool -tV _parse (first 80 lines) ==="
            otool -tV ./nova-stage1 2>&1 | grep -A 80 "_parse:" || echo "(no _parse section)"
          fi
          ./nova-stage1 --version; echo "version exit=$?"
          ./nova-stage1 2>&1; echo "plain exit=$?"

      - name: Self-hosted bootstrap — Stage1 compiles a test program
        if: runner.os != 'Windows'
        run: |
          set +e
          ./nova-stage1 build ./ci-tmp/selfhost.nv 2>&1; rc=$?
          echo "## Stage1 build exit code: $rc" >> $GITHUB_STEP_SUMMARY
          if [ "${{ runner.os }}" = "macOS" ] && [ -f ./ci-tmp/selfhost.s ]; then
            echo "=== selfhost.s (first 60 lines) ==="
            head -60 ./ci-tmp/selfhost.s
          fi
          exit $rc

      - name: Self-hosted bootstrap — Run compiled output
        if: runner.os != 'Windows'
        run: |
          ./ci-tmp/selfhost 2>&1; rc=$?
          echo "## Selfhost exit code: $rc" >> $GITHUB_STEP_SUMMARY
          exit $rc

      - name: Verify install.py imports cleanly
        run: python -c "import install; print('install.py OK')"
