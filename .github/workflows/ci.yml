name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Galaxy tests
        run: python -m unittest tests.test_galaxy -v

      - name: Run Installer tests
        run: python -m unittest tests.test_installers -v

      - name: Run x86_64 codegen tests
        run: python -m unittest tests.test_codegen_x86_64 -v
        if: runner.os != 'macOS'

      - name: Run ARM64 codegen tests
        run: python -m unittest tests.test_codegen_arm64 -v
        if: runner.os == 'macOS'

      - name: Nova smoke test — version
        run: python bootstrap/main.py --version

      - name: Nova smoke test — VM execution
        run: |
          mkdir -p ./ci-tmp
          printf 'print("Hello from Nova CI")\n' > ./ci-tmp/hello.nv
          python bootstrap/main.py dev ./ci-tmp/hello.nv

      - name: Native compilation — generate assembly, compile runtime, assemble + link
        if: runner.os != 'Windows'
        run: |
          mkdir -p ./ci-tmp
          printf 'print("Hello from Nova CI")\n' > ./ci-tmp/test_cc.nv
          python bootstrap/main.py build ./ci-tmp/test_cc.nv
          ./ci-tmp/test_cc

      - name: Self-hosted bootstrap — Nova builds a test program
        if: runner.os != 'Windows'
        run: |
          python bootstrap/main.py build nova.nv
          STAGE1="./nova"
          STAGE1_SAFE="./nova-stage1"
          mv "$STAGE1" "$STAGE1_SAFE"
          mkdir -p ./ci-tmp
          printf 'print("Self-hosted Nova OK")\n' > ./ci-tmp/selfhost.nv
          "$STAGE1_SAFE" build ./ci-tmp/selfhost.nv
          ./ci-tmp/selfhost

      - name: Verify install.py imports cleanly
        run: python -c "import install; print('install.py OK')"
