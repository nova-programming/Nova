name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Galaxy tests
        run: python -m unittest tests.test_galaxy -v

      - name: Run Installer tests
        run: python -m unittest tests.test_installers -v

      - name: Run x86_64 codegen tests
        run: python -m unittest tests.test_codegen_x86_64 -v
        if: matrix.os != 'macos-latest'

      - name: Run ARM64 codegen tests
        run: python -m unittest tests.test_codegen_arm64 -v
        if: matrix.os == 'macos-latest'

      - name: Nova smoke test — version
        run: python bootstrap/main.py --version

      - name: Nova smoke test — VM execution
        run: |
          mkdir -p /tmp/nova-ci
          printf 'print("Hello from Nova CI")\n' > /tmp/nova-ci/hello.nv
          python bootstrap/main.py dev /tmp/nova-ci/hello.nv

      - name: Native compilation — generate assembly, compile runtime, assemble + link
        run: |
          mkdir -p /tmp/nova-ci
          printf 'print("Hello from Nova CI")\n' > /tmp/nova-ci/test_cc.nv
          python bootstrap/main.py build /tmp/nova-ci/test_cc.nv
          if [ "$RUNNER_OS" = "Windows" ]; then
            /tmp/nova-ci/test_cc.exe
          else
            /tmp/nova-ci/test_cc
          fi
        shell: bash

      - name: Self-hosted bootstrap — Nova builds a test program
        run: |
          python bootstrap/main.py build nova.nv
          if [ "$RUNNER_OS" = "Windows" ]; then
            STAGE1="./nova.exe"
            STAGE1_SAFE="./nova-stage1.exe"
          else
            STAGE1="./nova"
            STAGE1_SAFE="./nova-stage1"
          fi
          mv "$STAGE1" "$STAGE1_SAFE"
          mkdir -p /tmp/nova-ci
          printf 'print("Self-hosted Nova OK")\n' > /tmp/nova-ci/selfhost.nv
          $STAGE1_SAFE build /tmp/nova-ci/selfhost.nv
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./selfhost.exe
          else
            ./selfhost
          fi
        shell: bash

      - name: Verify install.py imports cleanly
        run: python -c "import install; print('install.py OK')"
